name: Bug Report
description: Report a bug or unexpected behavior in ZoAuth
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.
        **For security vulnerabilities, please use [private security advisory](https://github.com/zoauth/go-auth-engine/security/advisories/new) instead.**

  - type: input
    id: version
    attributes:
      label: ZoAuth Version
      description: Run `zoauth --version` or check your image tag
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker Compose
        - Cloud Run
        - Kubernetes / Helm
        - Binary / systemd
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure client with ...
        2. Call /oauth2/authorize with ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant log lines (set LOG_LEVEL=debug for more detail). Remove sensitive values.
      render: json

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant env vars (redact secrets — replace actual values with `***`)
      render: env
