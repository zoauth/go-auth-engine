# docker-compose.standalone.yml
# ZoAuth standalone — auth engine + PostgreSQL.
# No Spring, no Liquibase, no external services required.
#
# Usage:
#   cp .env.standalone.example .env
#   # Edit .env — set JWT_ISSUER, JWK_ENCRYPTION_PASSWORD, JWK_ENCRYPTION_SALT
#   docker compose -f docker-compose.standalone.yml --env-file .env up -d

version: '3.9'

services:

  zoauth:
    image: ghcr.io/zoauth/go-auth-engine:${ZOAUTH_VERSION:-latest}
    ports:
      - "${PORT:-8080}:8080"
      - "${METRICS_PORT:-9090}:9090"
    environment:
      DATABASE_URL:             "postgres://zoauth:${POSTGRES_PASSWORD:-zoauth_dev_pass}@postgres:5432/zoauth?sslmode=disable"
      JWT_ISSUER:               "${JWT_ISSUER:-http://localhost:8080}"
      JWT_ACCESS_TOKEN_TTL:     "${JWT_ACCESS_TOKEN_TTL:-1h}"
      JWT_REFRESH_TOKEN_TTL:    "${JWT_REFRESH_TOKEN_TTL:-720h}"
      JWK_ENCRYPTION_PASSWORD:  "${JWK_ENCRYPTION_PASSWORD}"
      JWK_ENCRYPTION_SALT:      "${JWK_ENCRYPTION_SALT}"
      JWK_ENCRYPTION_MODE:      "GCM"
      SPRING_ENABLED:           "false"
      AUTHCODE_NATIVE:          "true"
      LOGOUT_NATIVE:            "true"
      CONSENT_NATIVE:           "true"
      DEVICE_NATIVE:            "true"
      PAR_NATIVE:               "true"
      DCR_NATIVE:               "true"
      AUTHCODE_LOGIN_URL:       "${LOGIN_URL:-http://localhost:8080/login}"
      SEED_DEFAULT_TENANT:      "${SEED_DEFAULT_TENANT:-false}"
      SEED_ADMIN_EMAIL:         "${SEED_ADMIN_EMAIL:-admin@example.com}"
      SEED_ADMIN_PASSWORD:      "${SEED_ADMIN_PASSWORD:-change-me-now}"
      ZOAUTH_LICENSE_KEY:       "${ZOAUTH_LICENSE_KEY:-}"
      METRICS_ENABLED:          "true"
      LOG_LEVEL:                "${LOG_LEVEL:-info}"
      LOG_FORMAT:               "${LOG_FORMAT:-json}"
      REDIS_URL:                "${REDIS_URL:-}"
      CORS_ALLOWED_ORIGINS:     "${CORS_ALLOWED_ORIGINS:-http://localhost:3000}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/auth-engine", "--health-check"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     zoauth
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-zoauth_dev_pass}"
      POSTGRES_DB:       zoauth
    volumes:
      - zoauth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoauth"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  zoauth_postgres_data:
